apiVersion: operator.dpu.nvidia.com/v1alpha1
kind: DPFOperatorConfig
metadata:
  name: dpfoperatorconfig
  namespace: dpf-operator-system
spec:
  imagePullSecrets:
    - dpf-pull-secret
  # Kamaji is permanently disabled - only Hypershift is supported
  kamajiClusterManager:
    disable: true
  #Openshift multus is used for DPU cluster 
  multus:
    disable: true
  cniInstaller:
    # CNI installer isn't relevant for the OpenShift use case.
    # In 25.10 it does not support the RHCOS BFB.
    disable: true
  overrides:
    kubernetesAPIServerVIP: api.<CLUSTER_NAME>.<BASE_DOMAIN>
    kubernetesAPIServerPort: 6443
    dpuCNIBinPath: /var/lib/cni/bin/
    dpuCNIPath: /run/multus/cni/net.d/
    # Configure lib64 path for RHCOS systems
    dpuOpenvSwitchSystemSharedLib64Path: /lib64
    # When using OpenShift Multus (default), Flannel needs to install CNI config
    flannelSkipCNIConfigInstallation: false
  provisioningController:
    hostAgentDNSPolicy: Default
    bfCFGTemplateConfigMap: custom-bfb.cfg
    bfbPVCName: bfb-pvc
    dmsTimeout: 900
    registry:
      port: 8086
      address: <BFB_REGISTRY_ADDRESS>
  nodeSRIOVDevicePluginController:
    devicePlugin:
      defaultResourcePrefix: <SRIOV_DP_RESOURCE_PREFIX>
    disable: false
    replicas: 1
  staticClusterManager:
    disable: false
